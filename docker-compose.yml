services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MINI_REDIS_APP_NAME: mini-redis demo
      MINI_REDIS_MONGO_URI: mongodb://mongo:27017
      MINI_REDIS_MONGO_DATABASE: mini_redis_demo
      MINI_REDIS_MONGO_COLLECTION: products
      MINI_REDIS_SNAPSHOT_PATH: /app/data/snapshot.json
      MINI_REDIS_AOF_PATH: /app/data/appendonly.aof.jsonl
      MINI_REDIS_ENABLE_DEMO_CRASH: "true"
      MINI_REDIS_STOREFRONT_ORIGIN_DELAY_MS: "140"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
